<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Uma homenagem para o papai</title>

<link rel="stylesheet" href="style.css">

</head>



<body>

<div class="overlay"></div>

<div class="container">

    <h1>❤️ Homenagem para o papai ❤️</h1>

    <p>Digite seu nome</p>

    <input
        type="text"
        id="nomePai"
        placeholder="Seu nome">

    <button onclick="iniciarHomenagem()">
        Iniciar homenagem
    </button>

</div>

<div id="slideshow"></div>

<div id="carta">

    <h2>💙 Carta Especial 💙</h2>

    <p>
        Papai, obrigado por cada risada,
        por cada abraço e por todo amor.

        Sua presença faz nossa vida mais feliz.

        Te tamo!
    </p>

    <h3>Com amor,<br>Aurora e Jaciara ❤️</h3>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script src="script.js"></script>



</body>
</html>
